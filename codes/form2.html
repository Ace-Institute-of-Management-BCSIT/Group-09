<head>

<title id="site-title">Government Sewa – Step-by-Step Office Route Guide</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&family=Noto+Sans+Devanagari:wght=400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* --- BRAND INTEGRATED DESIGN SYSTEM COLOR TOKENS --- */
  :root {
    --brand-red:       #DC143C;
    --brand-blue:      #003893;
    --brand-blue-dark: #002868;
    --brand-white:     #FFFFFF;

    --bg-light:        #f3f7fc;
    --text-dark:       #0f172a;
    --text-mid:        #334155;
    --text-muted:      #64748b;
    --border:          #cbd5e1;
    --blue-lighter:    #eef4ff;

    --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
    --shadow-md: 0 10px 25px rgba(0, 56, 147, 0.05);
    --shadow-lg: 0 20px 40px rgba(0, 40, 104, 0.12);
  }

  body {
    font-family: 'Plus Jakarta Sans', 'Noto Sans Devanagari', sans-serif;
    background-color: var(--bg-light);
    color: var(--text-dark);
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* Scrollbar Customization */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg-light); }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #a8b2c1; }

  /* ── TOPBAR FIXES (MATCHED TO HOMEPAGE) ── */
  .topbar {
    background: var(--brand-blue-dark);
    color: rgba(255,255,255,0.88);
    padding: 10px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .topbar-left { display: flex; align-items: center; gap: 8px; font-weight: 500; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .topbar-right button {
    background: none; border: none; color: rgba(255,255,255,0.75);
    cursor: pointer; font-size: 13px; font-family: inherit;
    transition: all 0.2s ease;
    padding: 3px 10px;
    border-radius: 4px;
    font-weight: 500;
    text-decoration: none; /* Fixed old underline bug */
  }
  .topbar-right button:hover { color: var(--brand-white); background: rgba(255,255,255,0.1); }
  .topbar-right button.active { 
    color: var(--brand-white); 
    background-color: var(--brand-red); 
    font-weight: 700; 
  }
  .topbar-sep { color: rgba(255,255,255,0.25); }

  /* ── PLATFORM-MATCHED HEADER NAVIGATION ── */
  .site-header {
    background: var(--brand-white);
    box-shadow: 0 4px 20px rgba(0, 56, 147, 0.03);
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.95);
  }

  .header-inner {
    max-width: 1280px;
    margin: auto;
    padding: 14px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 24px;
  }

  .logo-link {
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 13px;
    flex-shrink: 0;
  }

  .logo-circle {
    width: 44px;
    height: 44px;
    background: var(--brand-blue);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--brand-white);
    font-family: 'Noto Sans Devanagari', sans-serif;
    font-size: 20px;
    font-weight: 700;
  }

  .logo-texts { display: flex; flex-direction: column; gap: 1px; }
  .logo-en { font-size: 16.5px; font-weight: 700; color: var(--text-dark); letter-spacing: -0.01em; }
  .logo-ne { font-family: 'Noto Sans Devanagari', sans-serif; font-size: 12px; font-weight: 600; color: var(--brand-red); }

  nav { display: flex; gap: 4px; }
  nav a {
    text-decoration: none; 
    color: #475569;
    font-size: 14px; 
    font-weight: 500;
    padding: 8px 16px; 
    border-radius: 6px;
    position: relative;
    transition: all 0.2s ease;
  }
  nav a:hover { color: var(--brand-blue); background: var(--blue-lighter); }
  nav a.active { color: var(--brand-blue); background: var(--blue-lighter); font-weight: 600; }

  .btn-login {
    background: var(--brand-blue); color: var(--brand-white);
    border: none; text-decoration: none;
    padding: 10px 20px; border-radius: 6px;
    font-weight: 600; font-size: 14px;
    transition: all 0.2s ease; white-space: nowrap;
    box-shadow: 0 4px 10px rgba(0, 56, 147, 0.15);
  }
  .btn-login:hover { background: var(--brand-blue-dark); transform: translateY(-1px); box-shadow: 0 6px 14px rgba(0, 56, 147, 0.2); }

  /* --- GUIDANCE LAYOUT SYSTEM --- */
  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 50px 40px 80px;
    width: 100%;
  }

  .guidance-inner {
    max-width: 850px;
    margin: 0 auto;
  }

  .office-eyebrow {
    display: inline-flex;
    align-items: center;
    background: #fff0f2;
    color: var(--brand-red);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 20px;
    letter-spacing: 0.02em;
    border: 1px solid #fcd4da;
    text-transform: uppercase;
  }
  
  .guidance-h2 {
    font-size: 34px;
    font-weight: 800;
    color: var(--brand-blue-dark);
    letter-spacing: -0.025em;
    line-height: 1.2;
    margin-bottom: 24px;
  }
  
  .office-selector-wrapper {
    margin-bottom: 40px;
    background: var(--brand-white);
    padding: 20px;
    border-radius: 12px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  
  .office-select-label {
    display: block;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-mid);
    margin-bottom: 10px;
  }
  
  .office-dropdown {
    width: 100%;
    max-width: 500px;
    padding: 12px 16px;
    font-family: inherit;
    font-size: 14.5px;
    font-weight: 600;
    color: var(--text-dark);
    background-color: var(--brand-white);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .office-dropdown:focus {
    border-color: var(--brand-blue);
    box-shadow: 0 0 0 3px rgba(0, 56, 147, 0.12);
  }

  /* --- VERTICAL TIMELINE --- */
  .timeline-container {
    position: relative;
    padding-left: 35px;
  }
  .timeline-container::before {
    content: '';
    position: absolute;
    left: 13px;
    top: 15px;
    bottom: 15px;
    width: 2px;
    background: var(--border);
  }
  
  .timeline-step {
    position: relative;
    background: var(--brand-white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 25px;
    margin-bottom: 25px;
    box-shadow: var(--shadow-sm);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .timeline-step:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
  
  .timeline-badge {
    position: absolute;
    left: -35px;
    top: 24px;
    width: 28px;
    height: 28px;
    background: var(--brand-blue);
    color: var(--brand-white);
    font-size: 13px;
    font-weight: 800;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: translateX(-50%);
    z-index: 2;
    border: 3px solid var(--brand-white);
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  
  .step-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
    gap: 12px;
  }
  
  .step-room {
    font-size: 16px;
    font-weight: 700;
    color: var(--brand-blue);
  }
  
  .step-location-badge {
    font-size: 12px;
    font-weight: 700;
    color: var(--brand-red);
    background: #fff0f2;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid #fcd4da;
    white-space: nowrap;
  }
  
  .step-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-dark);
    margin-bottom: 8px;
  }
  
  .step-instruction {
    font-size: 14.5px;
    color: var(--text-mid);
    line-height: 1.6;
  }
  
  .step-tip {
    margin-top: 16px;
    background: #f8fafc;
    border-left: 3.5px solid var(--brand-red);
    padding: 12px 16px;
    font-size: 13.5px;
    color: var(--text-mid);
    border-radius: 0 8px 8px 0;
    border-top: 1px solid var(--border);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  /* --- RESPONSIVE MEDIA BREAKPOINTS --- */
  @media (max-width: 900px) {
    .header-inner {
      flex-direction: column;
      padding: 16px 20px;
      gap: 16px;
    }
    nav {
      flex-wrap: wrap;
      justify-content: center;
    }
    .container {
      padding: 30px 20px 60px;
    }
    .guidance-h2 {
      font-size: 28px;
    }
  }
</style>
</head>

  function updateStaticUI() {
    const labels = uiLabels[currentLang];
    document.title = labels.title;
    document.getElementById('txt-portal-tag').textContent = labels.portalTag;
    document.getElementById('nav-home').textContent = labels.home;
    document.getElementById('nav-services').textContent = labels.services;
    document.getElementById('nav-offices').textContent = labels.offices;
    document.getElementById('nav-forms').textContent = labels.forms;
    document.getElementById('nav-guidance').textContent = labels.guidance;
    document.getElementById('nav-contact').textContent = labels.contact;
    document.getElementById('btn-login-txt').textContent = labels.login;
    document.getElementById('txt-eyebrow').textContent = labels.eyebrow;
    document.getElementById('txt-heading').textContent = labels.heading;
    document.getElementById('txt-select-label').textContent = labels.selectLabel;
  }

  function updateDropdownOptions() {
    const selector = document.getElementById('office-select');
    const previousValue = selector.value;
    
    const options = dropdownOptions[currentLang];
    selector.innerHTML = options.map(opt => `
      <option value="${opt.value}">${opt.text}</option>
    `).join('');

    if (previousValue && options.some(o => o.value === previousValue)) {
      selector.value = previousValue;
    } else {
      selector.value = options[0].value;
    }
  }

  function renderTimeline() {
    const selector = document.getElementById('office-select');
    const container = document.getElementById('timeline-target');
    const officeKey = selector.value || 'ekantakuna';
    
    const selectedSteps = routesData[currentLang][officeKey];
    const tipWord = uiLabels[currentLang].tipLabel;

    container.innerHTML = selectedSteps.map(s => `
      <div class="timeline-step">
        <div class="timeline-badge">${s.step}</div>
        <div class="step-header">
          <span class="step-room">${s.room}</span>
          <span class="step-location-badge">${s.floor}</span>
        </div>
        <div class="step-title">${s.title}</div>
        <p class="step-instruction">${s.desc}</p>
        ${s.tip ? `<div class="step-tip"><strong>${tipWord}:</strong> ${s.tip}</div>` : ''}
      </div>
    `).join('');
  }

  function setLanguage(lang) {
    currentLang = lang;
    
    document.getElementById('lang-en').classList.toggle('active', lang === 'en');
    document.getElementById('lang-ne').classList.toggle('active', lang === 'ne');
    
    updateStaticUI();
    updateDropdownOptions();
    renderTimeline();
  }

  document.addEventListener('DOMContentLoaded', () => {
    const btnEn = document.getElementById('lang-en');
    const btnNe = document.getElementById('lang-ne');

    btnEn.addEventListener('click', () => setLanguage('en'));
    btnNe.addEventListener('click', () => setLanguage('ne'));
    
    document.getElementById('office-select').addEventListener('change', renderTimeline);
    setLanguage('en');
  });
</script>
